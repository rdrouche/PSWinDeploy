# docker-compose.yml -- Interface web PSWinDeploy
# A deployer sur un SERVEUR LINUX distinct du serveur Windows.
#
# Instructions :
#   1. Copier ce fichier et le dossier Web/ sur le serveur Linux
#   2. Definir l'IP du serveur Windows ci-dessous (API_BACKEND)
#      ou via un fichier .env a cote de ce docker-compose.yml :
#        echo "API_BACKEND=http://10.0.8.111:8080" > .env
#   3. docker compose up -d --build
#   4. Ouvrir : http://IP-SERVEUR-LINUX:3000

services:
  pswindeploy-web:
    build:
      context: ./Web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # URL de l'API Pode sur le serveur Windows
      # Surcharger via .env ou directement ici
      - API_BACKEND=${API_BACKEND:-http://SERVEUR_WINDOWS:8080}
    restart: unless-stopped
    networks:
      - deploy-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  deploy-net:
    driver: bridge
